name: 'push'
on: [pull_request, push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 11
      - uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version: 24
      - run: |
          pnpm install
          pnpm tsc --noEmit
